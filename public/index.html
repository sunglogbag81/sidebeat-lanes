<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebeat Lanes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">RIGHT → LEFT RHYTHM GAME</p>
        <h1>Sidebeat Lanes</h1>
        <p class="subtitle">노트가 오른쪽에서 왼쪽 판정선으로 달려오는 4레인 리듬게임 프로토타입.</p>
      </section>

      <section class="hud" aria-label="게임 상태">
        <div><span>Difficulty</span><strong id="difficultyLabel">Normal</strong></div>
        <div><span>Score</span><strong id="score">0</strong></div>
        <div><span>Combo</span><strong id="combo">0</strong></div>
        <div><span>Accuracy</span><strong id="accuracy">100.00%</strong></div>
        <div><span>Life</span><strong id="life">100</strong></div>
      </section>

      <section class="game-card">
        <canvas id="game" width="1100" height="520" aria-label="Sidebeat Lanes game canvas"></canvas>
        <div class="controls">
          <label class="difficulty-picker">
            <span>난이도</span>
            <select id="difficultySelect" aria-label="난이도 선택">
              <option value="easy">Easy</option>
              <option value="normal" selected>Normal</option>
              <option value="hard">Hard</option>
              <option value="expert">Expert</option>
            </select>
          </label>
          <button id="startButton">Start / Pause</button>
          <button id="restartButton">Restart</button>
          <p><kbd>D</kbd><kbd>F</kbd><kbd>J</kbd><kbd>K</kbd> 로 판정선에 도착한 노트를 치세요. <kbd>Space</kbd> 시작/일시정지, <kbd>R</kbd> 재시작.</p>
        </div>
      </section>

      <section class="editor-panel" aria-label="채보 에디터">
        <div class="editor-header">
          <div>
            <p class="eyebrow">CHART EDITOR</p>
            <h2>곡 업로드 & 채보 입력</h2>
          </div>
          <strong id="editorCount">0 notes</strong>
        </div>

        <div class="editor-grid">
          <label>
            <span>곡 파일</span>
            <input id="audioUpload" type="file" accept="audio/*" />
          </label>
          <label>
            <span>곡 제목</span>
            <input id="songTitle" type="text" placeholder="Untitled Song" />
          </label>
          <audio id="audioPlayer" controls preload="metadata"></audio>
        </div>

        <div class="tap-panel">
          <p>현재 시간 <strong id="editorTime">0.000s</strong> 에 노트를 찍습니다.</p>
          <div class="lane-buttons">
            <button type="button" data-editor-lane="0">D 레인 추가</button>
            <button type="button" data-editor-lane="1">F 레인 추가</button>
            <button type="button" data-editor-lane="2">J 레인 추가</button>
            <button type="button" data-editor-lane="3">K 레인 추가</button>
          </div>
        </div>

        <div class="chart-tools">
          <div>
            <div class="tool-row">
              <button id="downloadChart" type="button">JSON 다운로드</button>
              <button id="clearChart" type="button">채보 비우기</button>
            </div>
            <ol id="chartList" class="chart-list"></ol>
          </div>
          <label>
            <span>내보내기 JSON</span>
            <textarea id="exportChart" rows="10" readonly></textarea>
          </label>
          <label>
            <span>불러오기 JSON 붙여넣기</span>
            <textarea id="importChart" rows="10" placeholder='{"notes":[{"lane":0,"time":1200}]}'></textarea>
          </label>
        </div>
      </section>

      <section class="feedback">
        <strong id="judgement">Ready</strong>
        <span id="status">스페이스 또는 Start를 눌러 시작하세요.</span>
      </section>
    </main>
    <script src="app.js" type="module"></script>
  </body>
</html>
